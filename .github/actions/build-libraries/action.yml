name: Build libraries
description: |
  Builds @cockatrice/sockatrice and @cockatrice/datatrice dist/, optionally
  served from a content-addressed cache. Lazily initializes the vendor/cockatrice
  submodule (sparse) only when a build actually runs, so cache hits avoid the
  submodule fetch entirely. Consumer must have run `npm clean-install` first.

  Set `cache: 'false'` to always build from source and never read or write the
  shared cache — required for publish/release, where a stale or partial cached
  dist (e.g. a build cancelled between tsup and the declaration pass) would
  silently ship a declaration-less dist. CI test jobs leave it on (they only
  need the runtime JS, which the cache serves fine).

inputs:
  cache:
    description: Restore/save the dist cache. 'false' forces a fresh build.
    default: 'true'

runs:
  using: composite
  steps:
    # Content-addressed cache key from git plumbing. `git rev-parse HEAD:<path>`
    # returns the tree/blob SHA without reading file contents — same content =
    # same SHA, regardless of working-tree state.
    - name: Compute cache key
      if: inputs.cache == 'true'
      id: key
      shell: bash
      run: |
        SOCK=$(git rev-parse HEAD:packages/sockatrice)
        DATA=$(git rev-parse HEAD:packages/datatrice)
        LOCK=$(git rev-parse HEAD:package-lock.json)
        VEND=$(git ls-tree HEAD vendor/cockatrice | awk '{print $3}')
        echo "key=lib-dists-${{ runner.os }}-${VEND}-${SOCK}-${DATA}-${LOCK}" >> "$GITHUB_OUTPUT"

    - name: Restore library dists cache
      if: inputs.cache == 'true'
      id: cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
      with:
        path: |
          packages/sockatrice/dist
          packages/sockatrice/src/generated
          packages/datatrice/dist
        key: ${{ steps.key.outputs.key }}

    # When cache is disabled the Restore step is skipped, so cache-hit is the
    # empty string and every build step below runs — a fresh build from source.
    - name: Init vendor submodule (sparse)
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run assets:submodule

    - name: Build sockatrice
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run -w @cockatrice/sockatrice build

    - name: Build datatrice
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm run -w @cockatrice/datatrice build
