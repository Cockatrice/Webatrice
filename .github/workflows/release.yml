name: Release

# Two release flows in one workflow, both Changesets-driven:
#
#   - libraries: Publishes @cockatrice/sockatrice + @cockatrice/datatrice to
#     GitHub Packages. Runs automatically on every push to master (opens or
#     updates a "Version Packages" PR when changesets are pending; publishes
#     when that PR is merged). Can also be invoked manually with
#     `target=libraries` for a re-run.
#
#   - app: Builds + tarballs @cockatrice/webatrice and creates a GitHub
#     Release that deploy.yml then consumes. Webatrice is private (not
#     published to a registry), but Changesets versions its package.json via
#     `privatePackages.version: true` and tags it via `privatePackages.tag:
#     true`. This job reads that version, checks if the matching tag/release
#     already exists, and builds + releases when fresh. Runs on push to
#     master (idempotent — exits early when nothing to release) or manually.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to release'
        required: true
        default: 'libraries'
        type: choice
        options:
          - libraries
          - app

permissions:
  contents: read

jobs:
  libraries:
    name: Publish libraries (Changesets)
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'libraries' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@cockatrice'

      - name: Install dependencies
        run: npm clean-install

      - name: Create Release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  app:
    name: Build & release Webatrice app
    needs: [libraries]
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'app') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Read the Webatrice version from its package.json (Changesets sets it
      # via the Version Packages PR merge). Check whether a release at that
      # tag already exists — if so, skip; this keeps the push-trigger
      # idempotent across master pushes that don't bump Webatrice.
      - name: Check if Webatrice needs release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./packages/webatrice/package.json').version")
          TAG="@cockatrice/webatrice@${VERSION}"
          echo "Webatrice version is ${VERSION}; checking for existing release ${TAG}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release already exists; skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Release needed"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm clean-install

      - name: Build libraries (vite resolves @cockatrice/* via dist/)
        if: steps.check.outputs.skip != 'true'
        run: |
          npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Build app
        if: steps.check.outputs.skip != 'true'
        run: npm run -w @cockatrice/webatrice build

      - name: Stamp commit SHA into build
        if: steps.check.outputs.skip != 'true'
        run: echo "$GITHUB_SHA" > packages/webatrice/build/.deploy-sha

      - name: Package build directory
        if: steps.check.outputs.skip != 'true'
        id: package
        run: |
          ARCHIVE="webatrice-${{ steps.check.outputs.version }}.tar.gz"
          tar -czf "$ARCHIVE" -C packages/webatrice build
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          name: ${{ steps.check.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
