name: Release

# Two release flows in one workflow:
#   - libraries: Changesets-driven publishing of @cockatrice/sockatrice +
#     @cockatrice/datatrice to GitHub Packages. Runs automatically on every
#     push to master (opens/updates a "Version Packages" PR when changesets
#     are pending; publishes when that PR is merged). Can also be invoked
#     manually with `target=libraries`.
#   - app: manual Webatrice app release. Bumps the root package.json,
#     builds, packages the build/ directory as a tarball, and creates a
#     GitHub Release that deploy.yml then consumes.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to release'
        required: true
        default: 'libraries'
        type: choice
        options:
          - libraries
          - app
      bump:
        description: 'App version bump (only used when target=app)'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

jobs:
  libraries:
    name: Publish libraries (Changesets)
    if: ${{ github.event_name == 'push' || github.event.inputs.target == 'libraries' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@cockatrice'

      - name: Install dependencies
        run: npm clean-install

      - name: Create Release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  app:
    name: Build & release Webatrice app
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'app' && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump before prebuild: prebuild regenerates the tracked src/i18n-default.json
      # (OS-dependent key order), which would otherwise leave npm version a dirty tree.
      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} -m "chore(release): %s")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prebuild
        run: npm run prebuild

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Integration test with coverage
        run: npm run test:integration:coverage

      - name: Build app
        run: npm run build

      - name: Stamp commit SHA into build
        run: echo "$GITHUB_SHA" > build/.deploy-sha

      - name: Package build directory
        id: package
        run: |
          VERSION="${{ steps.bump.outputs.version }}"      # e.g. v1.0.1
          ARCHIVE="webatrice-${VERSION#v}.tar.gz"          # e.g. webatrice-1.0.1.tar.gz
          tar -czf "$ARCHIVE" build
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
