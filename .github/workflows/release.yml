name: Release

# Sole owner of @cockatrice/sockatrice + @cockatrice/datatrice on GH Packages
# and of the @cockatrice/webatrice@<v> GitHub Release that deploy.yml consumes.
# Version PR maintenance lives in changesets.yml.
#
# Detection signal is per-package CHANGELOG.md diff vs HEAD~1: only
# `changeset version` writes those files, so a CHANGELOG change on master is
# the precise signal that the package was in the Version PR just merged.
#
# No workflow_dispatch — recovery from a failed publish is "Re-run all jobs"
# in the Actions UI.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  detect:
    name: Detect released packages
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      sockatriceReleased: ${{ steps.filter.outputs.sockatriceReleased }}
      datatriceReleased: ${{ steps.filter.outputs.datatriceReleased }}
      webatriceReleased: ${{ steps.filter.outputs.webatriceReleased }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          # depth 2 so HEAD~1 exists for the paths-filter diff base
          fetch-depth: 2
          persist-credentials: false

      # paths-filter@v4 rejects rev expressions like HEAD~1 in `base:` —
      # resolve to a concrete SHA first.
      - name: Resolve previous commit SHA
        id: prev
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"

      - name: Filter released CHANGELOGs
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          base: ${{ steps.prev.outputs.sha }}
          filters: |
            sockatriceReleased: ['packages/sockatrice/CHANGELOG.md']
            datatriceReleased: ['packages/datatrice/CHANGELOG.md']
            webatriceReleased: ['packages/webatrice/CHANGELOG.md']

  libraries:
    name: Publish libraries
    needs: [detect]
    if: ${{ needs.detect.outputs.sockatriceReleased == 'true' || needs.detect.outputs.datatriceReleased == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@cockatrice'

      - name: Install packages (skip prebuild)
        uses: ./.github/actions/install-packages
        with:
          prebuild-webatrice: 'false'

      # datatrice's prepack dts build resolves @cockatrice/sockatrice/types
      # through the workspace symlink, so sockatrice's dist/ must exist first.
      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Publish to GitHub Packages
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b  # v1.8.0
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack published libraries for attestation
        id: pack
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          mkdir -p attest
          echo "$PUBLISHED" | jq -r '.[].name' | while read -r name; do
            npm pack -w "$name" --pack-destination attest
          done

      - name: Attest build provenance
        if: steps.changesets.outputs.published == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: 'attest/*.tgz'

      - name: Summarize published libraries
        if: steps.changesets.outputs.published == 'true'
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          {
            echo "### Published libraries"
            echo ""
            echo "$PUBLISHED" | jq -r '.[] | "- \(.name)@\(.version)"'
          } >> "$GITHUB_STEP_SUMMARY"

  app:
    name: Release app
    needs: [detect]
    if: ${{ needs.detect.outputs.webatriceReleased == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # `webatrice build` below triggers prebuild via its lifecycle hook.
      - name: Install packages (skip prebuild)
        uses: ./.github/actions/install-packages
        with:
          prebuild-webatrice: 'false'

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Build app
        run: npm run -w @cockatrice/webatrice build

      # GITHUB_SHA is the workflow's trigger SHA, not necessarily the SHA we
      # checked out (workflow_run can diverge); read from the checkout.
      - name: Build release artifact
        id: meta
        run: |
          VERSION=$(node -p "require('./packages/webatrice/package.json').version")
          ARCHIVE="webatrice-${VERSION}.tar.gz"
          git rev-parse HEAD > packages/webatrice/build/.deploy-sha
          tar -czf "$ARCHIVE" -C packages/webatrice build
          {
            echo "tag=@cockatrice/webatrice@${VERSION}"
            echo "archive=${ARCHIVE}"
          } >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ steps.meta.outputs.archive }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.archive }}

      - name: Summarize app release
        run: |
          {
            echo "### Released app"
            echo ""
            echo "- ${{ steps.meta.outputs.tag }} ([release](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}))"
            echo "- Commit: \`$(git rev-parse HEAD)\`"
          } >> "$GITHUB_STEP_SUMMARY"
