name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Node 24 to match Webatrice's own ci.yml (siblings use 20 as their baseline).
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm clean-install

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Bump before prebuild: prebuild regenerates the tracked src/i18n-default.json
      # (OS-dependent key order), which would otherwise leave npm version a dirty tree.
      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} -m "chore(release): %s")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Prebuild
        run: npm run prebuild

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Integration test with coverage
        run: npm run test:integration:coverage

      - name: Build app
        run: npm run build

      - name: Stamp commit SHA into build
        run: echo "$GITHUB_SHA" > build/.deploy-sha

      - name: Package build directory
        id: package
        run: |
          VERSION="${{ steps.bump.outputs.version }}"      # e.g. v1.0.1
          ARCHIVE="webatrice-${VERSION#v}.tar.gz"          # e.g. webatrice-1.0.1.tar.gz
          tar -czf "$ARCHIVE" build
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
