name: Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm clean-install

      - name: Build app
        run: npm run build

      - name: Stamp commit SHA into build
        run: echo "$GITHUB_SHA" > build/.deploy-sha

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: webatrice-build
          path: build/
          include-hidden-files: true
          retention-days: 30
          if-no-files-found: error
