name: Build

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: React (Node ${{matrix.node_version}})

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node_version:
          - 20
          - lts/*

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{matrix.node_version}}
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm clean-install

      - name: Build app
        run: npm run build

      - name: Test app
        run: npm run test
