name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to deploy (defaults to the latest release)"
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to DigitalOcean droplet
    runs-on: ubuntu-latest

    steps:
      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            RELEASE_TAG="$(gh release view --json tagName --jq .tagName)"
          fi
          echo "Deploying release \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          gh release download "$RELEASE_TAG" --pattern 'webatrice-*.tar.gz' --dir .

      - name: Extract archive
        run: tar -xzf webatrice-*.tar.gz

      - name: Read release SHA
        id: sha
        run: |
          sha="$(cat build/.deploy-sha)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Deploying commit \`$sha\` to webatrice.cockatrice.us" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up SSH
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.RR_BETA_SERVER_PRIVATE_SSH_KEY }}
          known_hosts: ${{ secrets.RR_BETA_SERVER_KNOWN_HOSTS }}
          name: deploy_key

      - name: Sync release to droplet
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 4924 -o StrictHostKeyChecking=accept-new" \
            ./build/ ${{ secrets.RR_BETA_SERVER_DEPLOY_USER }}@${{ secrets.RR_BETA_SERVER_DEPLOY_HOST }}:
