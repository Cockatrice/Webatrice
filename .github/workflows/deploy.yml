name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: stage
        type: choice
        options:
          - stage
      tag:
        description: "Optional release tag to deploy (defaults to the latest release)"
        required: false
        type: string

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    # Scopes secrets + non-secret variables (e.g. SITE_URL) to the chosen
    # environment. Each environment has its own SSH key, host, and site URL.
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    steps:
      - name: Download release archive
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if [ -z "$RELEASE_TAG" ]; then
            # Find the most-recent @cockatrice/webatrice@<version> tag. After
            # the monorepo migration, the registry also produces tags for
            # @cockatrice/sockatrice@<version> + @cockatrice/datatrice@<version>;
            # filter to webatrice-only so a sibling library release doesn't
            # divert the deploy.
            RELEASE_TAG="$(gh release list --limit 50 --json tagName --jq '[.[].tagName | select(startswith("@cockatrice/webatrice@"))][0]')"
            if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" = "null" ]; then
              echo "No @cockatrice/webatrice@ release found" >&2
              exit 1
            fi
          fi
          echo "Deploying release \`$RELEASE_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          gh release download "$RELEASE_TAG" --pattern 'webatrice-*.tar.gz' --dir .

      # Cryptographic chain back to release.yml's `actions/attest-build-provenance`
      # step. Fails the deploy if the tarball isn't attested by this repo's
      # release workflow.
      - name: Verify build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh attestation verify webatrice-*.tar.gz --repo "$GITHUB_REPOSITORY"

      - name: Extract archive
        run: tar -xzf webatrice-*.tar.gz

      - name: Read release SHA
        id: sha
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          sha="$(tr -d '\n' < build/version.txt)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Deploying commit \`$sha\` to $SITE_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up SSH
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3  # v2.8.1
        with:
          key: ${{ secrets.RR_BETA_SERVER_PRIVATE_SSH_KEY }}
          known_hosts: ${{ secrets.RR_BETA_SERVER_KNOWN_HOSTS }}
          name: deploy_key

      - name: Sync release to droplet
        env:
          DEPLOY_USER: ${{ secrets.RR_BETA_SERVER_DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.RR_BETA_SERVER_DEPLOY_HOST }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 4924 -o StrictHostKeyChecking=accept-new" \
            ./build/ "$DEPLOY_USER@$DEPLOY_HOST:"

      # Smoke test: confirm the live site is up and serving the SHA we just
      # rsynced. prebuild.js writes the commit SHA into public/version.txt,
      # which Vite copies to build/ and the server exposes at /version.txt.
      - name: Smoke test deployed site
        env:
          EXPECTED_SHA: ${{ steps.sha.outputs.sha }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          set -eu
          echo "Polling ${SITE_URL%/}/version.txt for SHA $EXPECTED_SHA"
          for i in $(seq 1 10); do
            ACTUAL=$(curl -fsSL --max-time 10 "${SITE_URL%/}/version.txt" 2>/dev/null | tr -d '\n' || true)
            if [ "$ACTUAL" = "$EXPECTED_SHA" ]; then
              echo "Attempt $i: live site serving expected SHA $EXPECTED_SHA"
              echo "Live site serving expected SHA $EXPECTED_SHA" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i: got '$ACTUAL', want '$EXPECTED_SHA' — retrying"
            sleep 5
          done
          echo "Live site did not converge on expected SHA after 10 attempts" >&2
          exit 1
