name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Path-filter outputs that drive downstream-aware gating. A "root" change
  # (workspace config, lockfile, workflow file) is treated as touching
  # everything since it affects every package.
  changes:
    runs-on: ubuntu-latest
    outputs:
      sockatrice: ${{ steps.filter.outputs.sockatrice }}
      datatrice: ${{ steps.filter.outputs.datatrice }}
      webatrice: ${{ steps.filter.outputs.webatrice }}
      proto: ${{ steps.filter.outputs.proto }}
      root: ${{ steps.filter.outputs.root }}
      # The path-filter step outputs literal strings "true"/"false"; both are
      # truthy in GHA expression evaluation, so a bare `||` chain on the raw
      # outputs always returns the first value. Coerce to real booleans with
      # `== 'true'` before OR'ing.
      sockatriceGate: ${{ steps.filter.outputs.sockatrice == 'true' || steps.filter.outputs.proto == 'true' || steps.filter.outputs.root == 'true' }}
      datatriceGate: ${{ steps.filter.outputs.sockatrice == 'true' || steps.filter.outputs.datatrice == 'true' || steps.filter.outputs.proto == 'true' || steps.filter.outputs.root == 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            sockatrice:
              - 'packages/sockatrice/**'
              - '!packages/sockatrice/.github/instructions/**'
            datatrice:
              - 'packages/datatrice/**'
              - '!packages/datatrice/.github/instructions/**'
            webatrice:
              - 'packages/webatrice/**'
              - '!packages/webatrice/.github/instructions/**'
            proto:
              - 'vendor/cockatrice/libcockatrice_protocol/**'
              - 'packages/sockatrice/buf.gen.yaml'
              - 'packages/sockatrice/buf.gen.plugin.mjs'
            root:
              - 'tsconfig.json'
              - 'tsconfig.base.json'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
              - '.changeset/**'
              - '.github/workflows/**'

  # tsc -b across the whole package graph is the cross-package contract gate.
  # Always runs (cheap relative to e2e) on both node versions.
  typecheck:
    name: Typecheck (Node ${{ matrix.node_version }})
    needs: [changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Generate proto bindings
        run: npm run -w @cockatrice/sockatrice proto:generate

      - name: tsc -b (library graph)
        run: npx tsc -b packages/sockatrice/tsconfig.build.json packages/datatrice/tsconfig.build.json

      - name: tsc --noEmit (app)
        run: npx tsc --noEmit -p packages/webatrice/tsconfig.json

  # One lint pass per package. Each package keeps its own ESLint config and
  # boundaries graph; we just invoke them serially. The library dist/ outputs
  # must exist before linting the app, since eslint-import-resolver-typescript
  # resolves `@cockatrice/sockatrice` via the workspace symlink to dist/.
  lint:
    name: Lint (Node ${{ matrix.node_version }})
    needs: [changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24', 'lts/*']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Build libraries (needed for app import resolution)
        run: |
          npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Lint sockatrice
        run: npm run -w @cockatrice/sockatrice lint

      - name: Lint datatrice
        run: npm run -w @cockatrice/datatrice lint

      - name: Lint app
        run: npm run -w @cockatrice/webatrice lint

  # Downstream-aware unit tests: a sockatrice change runs all three suites,
  # a datatrice change runs datatrice + app, an app-only change runs just app.
  test:
    name: Unit tests (Node ${{ matrix.node_version }})
    needs: [changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24', 'lts/*']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Build libraries (app tests resolve @cockatrice/* via dist/)
        run: |
          npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Sockatrice unit tests
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice test:coverage

      - name: Datatrice unit tests
        if: needs.changes.outputs.datatriceGate == 'true'
        run: npm run -w @cockatrice/datatrice test:coverage

      - name: App unit tests
        run: npm run -w @cockatrice/webatrice test:coverage

  # Same downstream-aware gating for integration suites.
  integration:
    name: Integration tests (Node ${{ matrix.node_version }})
    needs: [changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24', 'lts/*']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Build libraries (app integration resolves @cockatrice/* via dist/)
        run: |
          npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Sockatrice integration
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice test:integration:coverage

      - name: Datatrice integration
        if: needs.changes.outputs.datatriceGate == 'true'
        run: npm run -w @cockatrice/datatrice test:integration:coverage

      - name: App integration
        run: npm run -w @cockatrice/webatrice test:integration:coverage

  # Library tsup builds + vite app build. Single node version (build is slow
  # and the matrix would mostly catch the same issues as typecheck).
  build:
    needs: [changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Build sockatrice
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice build

      - name: Build datatrice
        if: needs.changes.outputs.datatriceGate == 'true'
        run: |
          [ -d packages/sockatrice/dist ] || npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Build app
        run: |
          [ -d packages/sockatrice/dist ] || npm run -w @cockatrice/sockatrice build
          [ -d packages/datatrice/dist ] || npm run -w @cockatrice/datatrice build
          npm run -w @cockatrice/webatrice build

  # Sockatrice's WebSocket-level Docker e2e — only when sockatrice or the
  # proto schema changed (expensive).
  sockatrice-e2e:
    name: Sockatrice e2e (Servatrice)
    needs: [changes]
    if: needs.changes.outputs.sockatriceGate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Generate proto bindings
        run: npm run -w @cockatrice/sockatrice proto:generate

      - name: Build sockatrice
        run: npm run -w @cockatrice/sockatrice build

      - name: Start Servatrice
        run: npm run -w @cockatrice/sockatrice test:e2e:up

      - name: Run sockatrice e2e
        run: npm run -w @cockatrice/sockatrice test:e2e:run

      - name: Tear down
        if: always()
        run: npm run -w @cockatrice/sockatrice test:e2e:down

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::servatrice logs"
          docker logs sockatrice-e2e-servatrice-1 || true
          echo "::endgroup::"
          echo "::group::mysql logs"
          docker logs sockatrice-e2e-mysql-1 || true
          echo "::endgroup::"

  # Webatrice Playwright + Servatrice e2e. Always runs (user direction:
  # UI regressions matter regardless of which package the change touched).
  app-e2e:
    name: App e2e (Playwright + Servatrice)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm clean-install

      - name: Install Playwright browsers
        run: npm run -w @cockatrice/webatrice test:e2e:install-browsers:linux

      - name: Build libraries (vite resolves @cockatrice/* via dist/)
        run: |
          npm run -w @cockatrice/sockatrice build
          npm run -w @cockatrice/datatrice build

      - name: Build app
        run: npm run -w @cockatrice/webatrice build

      - name: Start Servatrice (pulls ghcr.io/cockatrice/servatrice)
        run: npm run -w @cockatrice/webatrice test:e2e:up

      - name: Run Playwright tests
        run: npm run -w @cockatrice/webatrice test:e2e:run

      - name: Tear down
        if: always()
        run: npm run -w @cockatrice/webatrice test:e2e:down

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::servatrice logs"
          docker logs webatrice-e2e-servatrice-1 || true
          echo "::endgroup::"
          echo "::group::mysql logs"
          docker logs webatrice-e2e-mysql-1 || true
          echo "::endgroup::"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            packages/webatrice/playwright-report/
            packages/webatrice/test-results/
          retention-days: 7
