name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      sockatrice: ${{ steps.filter.outputs.sockatrice }}
      datatrice: ${{ steps.filter.outputs.datatrice }}
      webatrice: ${{ steps.filter.outputs.webatrice }}
      proto: ${{ steps.filter.outputs.proto }}
      root: ${{ steps.filter.outputs.root }}
      sockatriceGate: ${{ steps.filter.outputs.sockatrice == 'true' || steps.filter.outputs.proto == 'true' || steps.filter.outputs.root == 'true' }}
      datatriceGate: ${{ steps.filter.outputs.sockatrice == 'true' || steps.filter.outputs.datatrice == 'true' || steps.filter.outputs.proto == 'true' || steps.filter.outputs.root == 'true' }}
      documentation_only: ${{ steps.filter.outputs.nonDocs == 'false' }}
      changesetTouched: ${{ steps.filter.outputs.changesetTouched }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            sockatrice:
              - 'packages/sockatrice/**'
            datatrice:
              - 'packages/datatrice/**'
            webatrice:
              - 'packages/webatrice/**'
            proto:
              - 'vendor/cockatrice/libcockatrice_protocol/**'
              - 'packages/sockatrice/buf.gen.*'
            root:
              - 'tsconfig.base.json'
              - 'package.json'
              - 'package-lock.json'
              - '.npmrc'
              - '.github/**'
              - '!.github/instructions/**'
            nonDocs:
              - '**'
              - '!**/*.md'
            changesetTouched:
              - added|modified: '.changeset/*.md'

  typecheck:
    name: Typecheck (Node ${{ matrix.node_version }})
    needs: [changes]
    if: needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install packages
        uses: ./.github/actions/install-packages

      # Catches missing or malformed `.changeset/*.md` (missing frontmatter,
      # wrong bump type) before they reach master and break `changesets/action`.
      # Gated on pull_request + changesetTouched: skips master pushes (prebuild
      # dirties the working tree) and the Version Packages PR (which only
      # consumes changesets — no additions to validate).
      - name: Validate changesets
        if: github.event_name == 'pull_request' && needs.changes.outputs.changesetTouched == 'true'
        run: npx changeset status --since=origin/master

      - name: Init vendor submodule (sparse)
        run: npm run assets:submodule

      - name: Generate proto bindings
        run: npm run -w @cockatrice/sockatrice proto:generate


      - name: Typecheck
        run: npm run typecheck

  lint:
    name: Lint (Node ${{ matrix.node_version }})
    needs: [changes]
    if: needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install packages
        uses: ./.github/actions/install-packages

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Sockatrice lint
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice lint

      - name: Datatrice lint
        if: needs.changes.outputs.datatriceGate == 'true'
        run: npm run -w @cockatrice/datatrice lint

      - name: App lint
        run: npm run -w @cockatrice/webatrice lint

  test:
    name: Unit tests (Node ${{ matrix.node_version }})
    needs: [changes]
    if: needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install packages
        uses: ./.github/actions/install-packages

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Sockatrice unit tests
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice test:coverage

      - name: Datatrice unit tests
        if: needs.changes.outputs.datatriceGate == 'true'
        run: npm run -w @cockatrice/datatrice test:coverage

      - name: App unit tests
        run: npm run -w @cockatrice/webatrice test:coverage

  integration:
    name: Integration tests (Node ${{ matrix.node_version }})
    needs: [changes]
    if: needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node_version: ['24']
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install packages
        uses: ./.github/actions/install-packages

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Sockatrice integration tests
        if: needs.changes.outputs.sockatriceGate == 'true'
        run: npm run -w @cockatrice/sockatrice test:integration:coverage

      - name: Datatrice integration tests
        if: needs.changes.outputs.datatriceGate == 'true'
        run: npm run -w @cockatrice/datatrice test:integration:coverage

      - name: App integration tests
        run: npm run -w @cockatrice/webatrice test:integration:coverage

  # Expensive (Docker spinup); gated on sockatriceGate.
  sockatrice-e2e:
    name: Sockatrice e2e (Servatrice)
    needs: [changes]
    if: needs.changes.outputs.sockatriceGate == 'true' && needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # Doesn't touch webatrice; skip its prebuild step.
      - name: Install packages (skip prebuild)
        uses: ./.github/actions/install-packages
        with:
          prebuild-webatrice: 'false'

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Start Servatrice
        run: npm run -w @cockatrice/sockatrice test:e2e:up

      - name: Run sockatrice e2e
        run: npm run -w @cockatrice/sockatrice test:e2e:run


      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::servatrice logs"
          docker logs sockatrice-e2e-servatrice-1 || true
          echo "::endgroup::"
          echo "::group::mysql logs"
          docker logs sockatrice-e2e-mysql-1 || true
          echo "::endgroup::"

      - name: Tear down
        if: always()
        run: npm run -w @cockatrice/sockatrice test:e2e:down

  app-e2e:
    name: App e2e (Playwright + Servatrice)
    needs: [changes]
    if: needs.changes.outputs.documentation_only == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      # `webatrice build` below triggers prebuild via its lifecycle hook.
      - name: Install packages (skip prebuild)
        uses: ./.github/actions/install-packages
        with:
          prebuild-webatrice: 'false'

      - name: Cache Playwright browsers
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npm run -w @cockatrice/webatrice test:e2e:install-browsers:linux

      - name: Build libraries
        uses: ./.github/actions/build-libraries

      - name: Build app
        run: npm run -w @cockatrice/webatrice build

      - name: Start Servatrice (pulls ghcr.io/cockatrice/servatrice)
        run: npm run -w @cockatrice/webatrice test:e2e:up

      - name: Run Playwright tests
        run: npm run -w @cockatrice/webatrice test:e2e:run


      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::servatrice logs"
          docker logs webatrice-e2e-servatrice-1 || true
          echo "::endgroup::"
          echo "::group::mysql logs"
          docker logs webatrice-e2e-mysql-1 || true
          echo "::endgroup::"

      - name: Tear down
        if: always()
        run: npm run -w @cockatrice/webatrice test:e2e:down

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report
          path: |
            packages/webatrice/playwright-report/
            packages/webatrice/test-results/
          retention-days: 7

  ci-success:
    name: CI Success
    if: always()
    needs: [changes, typecheck, lint, test, integration, sockatrice-e2e, app-e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - name: Report success
        run: echo "All required jobs passed or were skipped."
