name: Changesets Version PR

# Maintains the Version Packages PR only — never publishes. Library publish
# and app release live in release.yml.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    name: Detect changeset additions
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      changesetsTouched: ${{ steps.filters.outputs.changesetsTouched }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          # depth 2 so HEAD~1 exists for the paths-filter diff base
          fetch-depth: 2
          persist-credentials: false

      # paths-filter@v4 rejects rev expressions like HEAD~1 in `base:` —
      # resolve to a concrete SHA first.
      - name: Resolve previous commit SHA
        id: prev
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"

      - name: Filter changeset additions
        id: filters
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          base: ${{ steps.prev.outputs.sha }}
          filters: |
            changesetsTouched: { added|modified: ['.changeset/*.md', '!.changeset/README.md'] }

  version-pr:
    name: Open or update Version Packages PR
    needs: [detect]
    if: ${{ needs.detect.outputs.changesetsTouched == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0
          # CHANGESETS_TOKEN (PAT) lets the bot-authored Version Packages PR
          # trigger CI on itself; the default GITHUB_TOKEN cannot.
          token: ${{ secrets.CHANGESETS_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install packages (skip prebuild)
        uses: ./.github/actions/install-packages
        with:
          prebuild-webatrice: 'false'

      - name: Open or update Version Packages PR
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d  # v1.9.0
        env:
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_TOKEN }}
