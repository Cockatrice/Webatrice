; Servatrice config used only by the e2e harness (both @cockatrice/webatrice
; and @cockatrice/sockatrice consume this same file). Mounted into the
; servatrice container at /tmp/servatrice.ini by docker-compose.e2e.yml.
; Differs from servatrice-docker.ini by enabling registration, skipping email
; activation, and relaxing per-host rate limits so parallel Playwright/Vitest
; workers from one machine don't trip them.

[server]
name="Cockatrice E2E"
logfile=server.log
writelog=0

[authentication]
; sql → registration + login hits the real accounts table, so the full
; register-then-login flow is exercised end-to-end.
method=sql
regonly=false

[users]
; Sockatrice tests generate "e2e_" + 6 hex chars = 10-char usernames.
; Webatrice tests use arbitrary short identifiers up to 16 chars. The 16
; ceiling here satisfies both.
minnamelength=4
maxnamelength=16
allowlowercase=true
allowuppercase=true
allownumerics=true
allowedpunctuation=_.-
allowpunctuationprefix=false
disallowedwords="admin"
minpasswordlength=6

[registration]
enabled=true
requireemail=false
requireemailactivation=false
maxaccountsperemail=0

[database]
type=mysql
prefix=cockatrice
hostname=mysql
database=servatrice
user=servatrice
password=password

[security]
trusted_sources="127.0.0.1,::1"
enable_max_user_limit=false
max_users_per_address=0
max_tcp_users_per_address=0
max_websocket_users_per_address=0

[game]
store_replays=false
max_game_inactivity_time=120
