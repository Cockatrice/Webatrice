# Standalone compose used by the Webatrice e2e harness.
# Paths are relative to THIS file's directory (e2e/docker/), so the file must
# be invoked with `-f e2e/docker/docker-compose.e2e.yml` from anywhere —
# Docker Compose resolves relative mounts against the compose file's own
# directory.
#
# Servatrice is consumed as the published `ghcr.io/cockatrice/servatrice`
# image (built and pushed by Cockatrice's docker-release.yml on every
# tagged release). No C++ source build, no submodule dependency for the
# e2e stack.
#
# `servatrice.sql` is sourced from the servatrice image itself: `make install`
# in Cockatrice's Dockerfile places it at /usr/local/share/servatrice/
# servatrice.sql. The `servatrice-sql` sidecar below copies it into a
# named volume that MySQL mounts at /docker-entrypoint-initdb.d/ so the
# schema is loaded on first start. The image tag is the single source of
# truth for the SQL schema version — binary and schema can't drift.
#
# `name:` namespaces the Compose project so that Webatrice's e2e stack
# does not collide with Sockatrice's (which uses the same default project
# name `docker` from its own e2e/docker/ directory). Without this, a
# `down -v` in one repo tears down the other repo's running containers.
name: webatrice-e2e

services:
  servatrice-sql:
    image: ghcr.io/cockatrice/servatrice:2026-05-08-Release-3.0.0
    pull_policy: always
    entrypoint: ["/bin/sh", "-c"]
    command: ["cp /usr/local/share/servatrice/servatrice.sql /init/servatrice.sql"]
    volumes:
      - servatrice_sql:/init
    restart: "no"

  mysql:
    image: mysql:8
    command: --sql_mode=
    environment:
      MYSQL_ROOT_PASSWORD: root-password
      MYSQL_DATABASE: servatrice
      MYSQL_USER: servatrice
      MYSQL_PASSWORD: password
    depends_on:
      servatrice-sql:
        condition: service_completed_successfully
    volumes:
      - servatrice_sql:/docker-entrypoint-initdb.d:ro
      - webatrice_e2e_mysql:/var/lib/mysql

  servatrice:
    image: ghcr.io/cockatrice/servatrice:2026-05-08-Release-3.0.0
    pull_policy: always
    depends_on:
      - mysql
    ports:
      - "4748:4748"
    # Wait for MySQL's TCP port to accept connections before launching
    # servatrice. The first-time `up` has to load servatrice.sql, which
    # takes longer than any fixed sleep — without this wait, servatrice
    # exits silently with code 0 when it can't reach the DB. The trailing
    # `sleep 2` gives mysqld a moment after the port opens to finish
    # accepting auth. global-setup additionally polls the WebSocket port to
    # avoid races.
    entrypoint: "/bin/bash -c 'until (echo > /dev/tcp/mysql/3306) 2>/dev/null; do sleep 1; done; sleep 2; servatrice --config /tmp/servatrice.ini --log-to-console'"
    volumes:
      - ./servatrice-e2e.ini:/tmp/servatrice.ini:ro

volumes:
  webatrice_e2e_mysql:
  servatrice_sql:
