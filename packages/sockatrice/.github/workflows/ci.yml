name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Integration tests with coverage
        run: npm run test:integration:coverage

      - name: Build sanity check
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Build package
        run: npm run build

      - name: Start Servatrice (pulls ghcr.io/cockatrice/servatrice)
        run: npm run test:e2e:up

      - name: Run e2e specs
        run: npm run test:e2e:run

      - name: Tear down
        if: always()
        run: npm run test:e2e:down

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "::group::servatrice logs"
          docker logs sockatrice-e2e-servatrice-1 || true
          echo "::endgroup::"
          echo "::group::mysql logs"
          docker logs sockatrice-e2e-mysql-1 || true
          echo "::endgroup::"
